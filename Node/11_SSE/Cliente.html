<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hora actualizada desde el servidor: </h1>
    <div id="time"></div>
    <div id="random"></div>
    <script>
        const eventSource = new EventSource("http://localhost:3000/SSE");

        eventSource.onmessage = (event) => {
            const datos = event.data.split("-");
            document.getElementById("time").textContent = datos[0];
            document.getElementById("random").textContent = datos[1];
        };

        eventSource.onerror = function (event) {
            console.error("Error de SSE: ", event);
            eventSource.close();
        }
    </script>
</body>
</html>
